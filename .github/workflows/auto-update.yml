name: Update README Index

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Magie : GitHub gère le cache si un requirements.txt existe

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Si tu as un fichier requirements.txt, utilise : pip install -r requirements.txt

      - name: 🛡️ Lint with flake8
        run: |
          # Vérification de la propreté du code
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🧪 Run Quality Check
        run: python check_recipes.py

      - name: 📝 Run update script
        run: python update_readme.py

      - name: 🚀 Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update README index [skip ci]" && git push)